<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width = device-width , initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Personal Course Organizer</title>
    </head>
    <body class="Add-course">
        <header>
            <nav class="nav">
                <div class="logo">
                    <h2>PCO</h2>
                </div>
                <div class="links">
                    <div class="tria"><a href="index.html">Home</a></div>
                    <div class="tria"><a href="courses.html">Courses</a></div>
                    <div class="tria"><a href="Add-course.html">Add Courses</a></div>
                    <div class="tria"><a href="contact.html">Contact Us</a></div>
                </div>
            </nav>
            
            <br>
        </header>
        
        <section>
            <div class="wise">
                <p>Your Future starts here. </p> 
                <p>Add a Course and begin. </p>
            </div>

            <div class="prag" >
            <p>You can add any course you want:</p>
            </div>
        </section>
        <main>
            <div class="card">
            <form>

            <div>
            <label>Course Name:</label>
            <br>
            <input type="text" placeholder="Course Name">
            </div>

            <br>

            <div>
            <label>Instructor:</label>
            <br>
            <input type="text" placeholder="Instructor">
            </div>

            <br>

            <div>
            <label>Credit Hours:</label>
            <br>
            <input type="number" placeholder="Credit Hours">
            </div>

            <br>

            <div>
            <label>Notes:</label>
            <br>
            <textarea name="subject" placeholder="Notes"></textarea>
            </div>

            <br>

            <button type="submit">Add Course</button>

            </form>
            </div>
        </main>
        <br>
        <footer>
            <div class="footer3">
